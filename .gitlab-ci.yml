stages:
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG
  DOCKER_IMAGE_STREAMLIT: $CI_REGISTRY_IMAGE/streamlit:$CI_COMMIT_REF_SLUG

services:
  - docker:27-dind

# removed global before_script to avoid errors in non-docker jobs

build:
  stage: build
  image: docker:27
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --pull -t $DOCKER_IMAGE_BACKEND -f docker/Dockerfile .
    - docker push $DOCKER_IMAGE_BACKEND
    - docker build --pull -t $DOCKER_IMAGE_STREAMLIT -f docker/Dockerfile .
    - docker push $DOCKER_IMAGE_STREAMLIT
  only:
    - main

test_backend:
  stage: test
  image: $DOCKER_IMAGE_BACKEND
  script:
    # No need to install anything! The docker image already has tf, librosa, etc.
    - cd /app
    - pytest tests/
  only:
    - main
    - merge_requests
  allow_failure: true

test_frontend:
  stage: test
  image: node:20-slim
  script:
    - cd frontend
    - npm install --prefer-offline --no-audit
    - npm run lint || echo "Linting failed but continuing..."
  only:
    - main
    - merge_requests
  allow_failure: true

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$AWS_PUBLIC_KEY" > ~/.ssh/id_rsa
    - tr -d '\r' < ~/.ssh/id_rsa > ~/.ssh/id_rsa_clean
    - mv ~/.ssh/id_rsa_clean ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $AWS_PUBLIC_IP >> ~/.ssh/known_hosts
  script:
    - echo "DOCKER_IMAGE_BACKEND=$DOCKER_IMAGE_BACKEND" > .env
    - echo "DOCKER_IMAGE_STREAMLIT=$DOCKER_IMAGE_STREAMLIT" >> .env
    - scp docker/docker-compose.yml .env $AWS_USERNAME@$AWS_PUBLIC_IP:~/
    - ssh $AWS_USERNAME@$AWS_PUBLIC_IP "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $DOCKER_IMAGE_BACKEND &&
        docker pull $DOCKER_IMAGE_STREAMLIT &&
        docker-compose up -d
      "
  environment:
    name: production
    url: http://$AWS_PUBLIC_IP
  only:
    - main
  when: manual
